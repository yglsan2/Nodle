server.port=8080
spring.application.name=nodle

# Upload GIFs : 20 Mo max par fichier
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Dossier de stockage des GIFs importés (créé automatiquement)
nodle.gifs.storage-path=./data/gifs

# Fournisseurs de GIFs (aucun partenariat exclusif : configurez les clés pour activer chaque fournisseur)
# Giphy : https://developers.giphy.com/dashboard/
nodle.gifs.giphy-api-key=
# Tenor (Google) : https://developers.google.com/tenor/guides/quickstart
nodle.gifs.tenor-api-key=

# Fichiers partagés par salle (documents, schémas, PDF)
nodle.room-files.path=./data/room-files

# ICE : STUN (obligatoire) et TURN (recommandé pour classes 10–20+ derrière NAT)
# Une seule URL ou plusieurs séparées par des virgules
nodle.ice.stun-urls=stun:stun.l.google.com:19302
# nodle.ice.turn-urls=turns:your-turn.example.com:443
# nodle.ice.turn-username=
# nodle.ice.turn-credential=

# SFU (mediasoup) : URL WebSocket du serveur SFU pour salles 10–20+ (optionnel)
# nodle.sfu.ws-url=ws://localhost:3001

# Signaling : URL WebSocket alternative (relais public ou autre). Vide = même origine que l'app.
# Pour petit groupe "sans serveur" : pointer vers un relais (voir relay/ dans le dépôt).
# nodle.signaling.ws-url=wss://relay.example.com/
